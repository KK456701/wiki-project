<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>核心制度指标 Agent</title>
<style>
:root {
  --paper: #f6f9f8;
  --paper-strong: #edf4f2;
  --panel: rgba(255,255,255,0.92);
  --panel-solid: #ffffff;
  --ink: #172320;
  --ink-soft: #334541;
  --muted: #637773;
  --line: #cfddda;
  --line-strong: #abc2bd;
  --teal: #087b75;
  --teal-deep: #045a56;
  --teal-soft: #dff4f1;
  --mint: #a9ddd5;
  --red: #a64536;
  --amber: #b66f1e;
  --shadow: 0 18px 45px rgba(30, 58, 53, 0.13);
  --mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
  --sans: Inter, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
}
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  font-family: var(--sans);
  color: var(--ink);
  background:
    linear-gradient(rgba(176,199,194,0.22) 1px, transparent 1px),
    linear-gradient(90deg, rgba(176,199,194,0.18) 1px, transparent 1px),
    var(--paper);
  background-size: 28px 28px, 28px 28px, auto;
}
body::before {
  content: "MQSI\A WIKI\A LOCAL";
  white-space: pre;
  position: fixed;
  left: 0;
  top: 0;
  bottom: 0;
  width: 76px;
  padding-top: 26px;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  color: rgba(255,255,255,0.78);
  background: #172320;
  font: 700 11px/1.8 var(--mono);
  letter-spacing: 0.12em;
  writing-mode: vertical-rl;
  text-orientation: mixed;
  z-index: 35;
  border-right: 1px solid rgba(255,255,255,0.16);
}
.app-shell { min-height: 100vh; display: flex; flex-direction: column; }
.topbar {
  min-height: 76px;
  margin: 16px 24px 0 100px;
  padding: 14px 18px 14px 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  border: 1px solid rgba(171,194,189,0.72);
  border-radius: 8px;
  background: rgba(255,255,255,0.78);
  backdrop-filter: blur(16px);
  box-shadow: 0 12px 36px rgba(37, 72, 66, 0.10);
  position: sticky;
  top: 12px;
  z-index: 30;
}
.brand { min-width: 260px; }
.brand-title {
  font-size: 24px;
  font-weight: 850;
  color: var(--ink);
  letter-spacing: -0.02em;
  line-height: 1.1;
  display: flex;
  align-items: center;
  gap: 10px;
}
.brand-title::before {
  content: "";
  width: 10px;
  height: 28px;
  border-radius: 999px;
  background: linear-gradient(180deg, var(--teal), var(--red));
  box-shadow: 0 0 0 5px rgba(8,124,117,0.08);
}
.brand-subtitle { margin-top: 7px; color: var(--muted); font-size: 13px; }
.topbar-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
.user-info { display: flex; align-items: center; gap: 7px; color: var(--muted); font-size: 13px; }
.user-badge { background: #e5f5e9; color: #237044; padding: 3px 9px; border-radius: 999px; font-size: 12px; font-weight: 700; }
.user-badge.company { background: #e4efff; color: #1f5fa8; }
.hospital-inline {
  height: 42px;
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--muted);
  font-size: 13px;
  padding: 0 8px 0 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255,255,255,0.68);
}
.hospital-inline input {
  width: 150px;
  height: 32px;
  padding: 0 8px;
  border: 0;
  border-left: 1px solid var(--line);
  outline: none;
  font: 600 15px/1 var(--sans);
  background: transparent;
  color: var(--ink);
}
.btn, button { border: 0; cursor: pointer; font: inherit; }
.btn, button.ghost, .merge-file-input, .role-tab, #sendButton { transition: transform .16s ease, box-shadow .16s ease, background .16s ease, border-color .16s ease; }
.btn:hover, button.ghost:hover, .merge-file-input:hover, .role-tab:hover, #sendButton:hover { transform: translateY(-1px); }
.btn-secondary {
  height: 42px;
  padding: 0 18px;
  color: #fff;
  background: var(--ink);
  border-radius: 8px;
  box-shadow: 0 10px 22px rgba(23,35,32,0.18);
}
.btn-ghost {
  height: 42px;
  padding: 0 18px;
  color: var(--ink-soft);
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255,255,255,0.66);
}
.btn-ghost.admin-logged { background: #e8f6ec; border-color: #8ac69c; color: #2f7549; }
.chat-layout { flex: 1; min-height: 0; display: flex; justify-content: center; overflow: hidden; padding-left: 76px; }
.messages {
  width: min(1040px, calc(100vw - 132px));
  padding: 44px 0 190px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--line-strong) transparent;
}
.message { display: flex; gap: 14px; margin: 22px 0; }
.message.user { justify-content: flex-end; }
.message.agent { justify-content: flex-start; }
.message-avatar {
  width: 38px;
  height: 38px;
  border-radius: 8px;
  flex: 0 0 auto;
  display: grid;
  place-items: center;
  font-weight: 800;
  font-size: 12px;
  letter-spacing: .04em;
}
.message.agent .message-avatar { background: var(--ink); color: #fff; box-shadow: 0 10px 22px rgba(23,35,32,0.18); }
.message.user .message-avatar { background: var(--teal-soft); color: var(--teal-deep); order: 2; border: 1px solid rgba(8,124,117,0.16); }
.message-bubble {
  max-width: min(780px, 78vw);
  border-radius: 8px;
  padding: 15px 17px;
  line-height: 1.78;
  white-space: pre-wrap;
  word-break: break-word;
  font-size: 15.5px;
}
.message.agent .message-bubble {
  color: var(--ink);
  background: rgba(255,255,255,0.88);
  border: 1px solid rgba(171,194,189,0.75);
  border-left: 4px solid var(--teal);
  box-shadow: var(--shadow);
}
.message.user .message-bubble {
  color: #082c2a;
  background: linear-gradient(135deg, #dff4f1, #ccebe6);
  border: 1px solid rgba(8,124,117,0.16);
  box-shadow: 0 12px 28px rgba(8,124,117,0.10);
}
.message-meta {
  margin-bottom: 8px;
  font: 650 12px/1.2 var(--mono);
  letter-spacing: .02em;
  color: #6e817d;
}
.welcome-card {
  padding: 8px 8px 4px;
  background: transparent;
}
.welcome-card h2 {
  margin: 0 0 12px;
  font-size: clamp(23px, 3vw, 34px);
  line-height: 1.15;
  letter-spacing: -0.035em;
  color: var(--ink);
}
.welcome-card h2::after {
  content: "";
  display: block;
  width: 56px;
  height: 3px;
  margin-top: 13px;
  border-radius: 999px;
  background: var(--red);
}
.welcome-card p { margin: 8px 0; line-height: 1.85; color: var(--ink-soft); }
.welcome-examples { display: flex; flex-wrap: wrap; gap: 9px; margin-top: 18px; }
.example-chip {
  min-height: 34px;
  border: 1px solid var(--line-strong);
  border-radius: 999px;
  padding: 7px 13px;
  background: rgba(255,255,255,0.72);
  cursor: pointer;
  color: var(--ink-soft);
  font-size: 13.5px;
}
.example-chip:hover { background: var(--teal-soft); border-color: var(--teal); color: var(--teal-deep); }
.composer-wrapper {
  position: fixed;
  left: 76px;
  right: 0;
  bottom: 0;
  padding: 22px 24px 20px;
  background: linear-gradient(180deg, rgba(246,249,248,0), rgba(246,249,248,0.94) 26%, var(--paper) 100%);
  z-index: 30;
}
.composer {
  width: min(1040px, calc(100vw - 132px));
  margin: 0 auto;
  display: flex;
  align-items: flex-end;
  gap: 12px;
  padding: 10px;
  border: 1px solid rgba(171,194,189,0.86);
  border-radius: 8px;
  background: rgba(255,255,255,0.92);
  box-shadow: 0 18px 46px rgba(30,58,53,0.16);
}
#queryInput {
  flex: 1;
  min-height: 48px;
  max-height: 160px;
  padding: 11px 12px;
  border: 0;
  outline: none;
  resize: none;
  font-size: 16px;
  line-height: 1.55;
  color: var(--ink);
  background: transparent;
}
#queryInput::placeholder { color: #8a9d99; }
#sendButton {
  min-width: 92px;
  height: 48px;
  padding: 0 20px;
  color: #fff;
  background: var(--teal);
  font-weight: 800;
  border-radius: 8px;
  font-size: 16px;
  box-shadow: 0 12px 24px rgba(8,124,117,0.24);
}
#sendButton:disabled { cursor: not-allowed; opacity: 0.55; transform: none; }
.composer-hint {
  width: min(1040px, calc(100vw - 132px));
  margin: 9px auto 0;
  color: var(--muted);
  font-size: 12px;
  display: flex;
  justify-content: space-between;
  gap: 20px;
}
.modal[hidden] { display: none; }
.modal { position: fixed; inset: 0; background: rgba(23,35,32,0.48); display: grid; place-items: center; padding: 22px; z-index: 100; backdrop-filter: blur(5px); }
.dialog {
  width: min(980px, 100%);
  max-height: 88vh;
  overflow: auto;
  background: var(--panel-solid);
  border-radius: 8px;
  border: 1px solid var(--line);
  box-shadow: 0 28px 70px rgba(23,35,32,0.26);
}
.dialog header { padding: 18px 20px; margin: 0; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; gap: 16px; }
.dialog h2 { margin: 0; letter-spacing: -0.02em; }
.dialog-body { padding: 18px 20px 22px; }
.comparison, .review-list, .version-list { display: grid; gap: 12px; }
.row, .review-item, .version-item {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 13px;
  background: #fbfdfc;
}
.row { display: grid; grid-template-columns: 128px 1fr 150px; gap: 12px; align-items: stretch; }
.row-title { font-weight: 800; color: var(--ink); }
.row-content { color: var(--ink-soft); white-space: pre-wrap; overflow-wrap: anywhere; }
.trace-node { display: grid; gap: 10px; border-left: 4px solid var(--teal); }
.trace-node.failed { border-left-color: var(--red); background: #fff8f6; }
.trace-node.fallback, .trace-node.warning { border-left-color: var(--amber); background: #fffaf0; }
.trace-title-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.trace-title { font-size: 18px; font-weight: 850; color: var(--ink); }
.trace-status {
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 3px 9px;
  font: 750 12px/1.2 var(--mono);
  color: var(--teal-deep);
  background: var(--teal-soft);
}
.trace-node.failed .trace-status { color: #8b2f22; background: #ffe9e3; border-color: #f2b8ab; }
.trace-node.fallback .trace-status, .trace-node.warning .trace-status { color: #8a5a00; background: #fff0c7; border-color: #e7c56b; }
.trace-desc { color: var(--ink-soft); font-size: 14px; }
.trace-section { display: grid; gap: 5px; }
.trace-section-title { color: var(--muted); font-size: 12px; font-weight: 800; }
.trace-json {
  margin: 0;
  padding: 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #ffffff;
  color: var(--ink-soft);
  white-space: pre-wrap;
  overflow-wrap: anywhere;
  font: 12px/1.5 var(--mono);
}
.trace-field-list { color: var(--ink-soft); font-size: 13px; }
.trace-hint { color: #6a5a20; background: #fff8dc; border: 1px solid #eadb93; border-radius: 8px; padding: 9px 10px; font-size: 13px; }
.review-actions { display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
.version-item.active { border-color: var(--teal); background: var(--teal-soft); }
.version-meta, .review-meta { color: var(--muted); font-size: 12px; }
.history-lookup { border: 1px solid var(--line); border-radius: 8px; padding: 12px; display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; margin-bottom: 12px; background: #fbfdfc; }
.history-lookup input, .login-box input, .login-card input, .login-card select {
  padding: 10px 11px;
  border: 1px solid var(--line);
  border-radius: 8px;
  font: inherit;
  min-width: 0;
  background: #fff;
  color: var(--ink);
}
button { border-radius: 8px; padding: 0 16px; background: var(--teal); color: white; cursor: pointer; min-height: 36px; }
button.danger { background: var(--red); }
button.ghost { background: #f4f8f7; color: var(--ink-soft); border: 1px solid var(--line); }
button:disabled { background: #879995; cursor: wait; transform: none; }
.review-tabs { display: flex; gap: 8px; margin-bottom: 14px; border-bottom: 1px solid var(--line); padding-bottom: 10px; }
.review-tab { background: #eef5f3; color: var(--ink-soft); border: 1px solid var(--line); }
.review-tab.active { background: var(--ink); color: #fff; border-color: var(--ink); }
.merge-toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.merge-file-input { display: inline-flex; align-items: center; min-height: 36px; padding: 0 16px; border-radius: 8px; background: var(--teal); color: #fff; cursor: pointer; }
.merge-report-list, .merge-report-list + div { display: grid; gap: 10px; }
.merge-report-item, .merge-item { border: 1px solid var(--line); background: #fbfdfc; color: var(--ink); border-radius: 8px; padding: 12px; text-align: left; }
.diff-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; font-size: 13px; border-radius: 8px; overflow: hidden; }
.diff-table th, .diff-table td { border: 1px solid var(--line); padding: 8px 10px; text-align: left; vertical-align: top; }
.diff-table th { background: #edf4f2; font-weight: 800; color: var(--ink); white-space: nowrap; }
.diff-table td { color: var(--ink-soft); white-space: pre-wrap; overflow-wrap: anywhere; background: #fff; }
.diff-table .changed { background: #fff6e8; }
.changed-badge { display: inline-block; background: var(--amber); color: #fff; font-size: 11px; padding: 1px 6px; border-radius: 999px; margin-left: 4px; }
.mcp-panel { display: grid; gap: 14px; }
.mcp-toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
.mcp-toolbar select {
  min-height: 38px;
  padding: 0 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  color: var(--ink);
  font: inherit;
}
.mcp-status {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 12px;
  background: #fbfdfc;
  color: var(--ink-soft);
  white-space: pre-wrap;
  overflow-wrap: anywhere;
}
.mcp-source-grid { display: grid; gap: 10px; }
.mcp-source-card {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 12px;
  background: #fff;
}
.mcp-source-card h3 { margin: 0 0 8px; font-size: 16px; }
.mcp-tool-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.mcp-tool-pill {
  border: 1px solid var(--line-strong);
  border-radius: 999px;
  padding: 4px 8px;
  background: var(--teal-soft);
  color: var(--teal-deep);
  font: 650 12px/1.2 var(--mono);
}
.login-screen { position: fixed; inset: 0; background: var(--paper); display: grid; place-items: center; z-index: 200; }
.login-screen[hidden] { display: none; }
.login-card {
  width: min(430px, 90vw);
  background: rgba(255,255,255,0.94);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 38px 32px;
  box-shadow: var(--shadow);
  text-align: center;
}
.login-card h2 { margin: 0 0 8px; font-size: 24px; color: var(--ink); letter-spacing: -0.03em; }
.login-card .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
.login-card label { display: block; text-align: left; color: var(--muted); font-size: 13px; margin-bottom: 5px; margin-top: 12px; }
.login-card button { width: 100%; margin-top: 16px; padding: 12px; font-size: 16px; }
.login-card .role-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
.login-card .role-tab { flex: 1; padding: 10px; border: 1px solid var(--line); border-radius: 8px; background: #fff; cursor: pointer; font-size: 15px; color: var(--muted); }
.login-card .role-tab.active { border-color: var(--teal); color: var(--teal-deep); font-weight: 800; background: var(--teal-soft); }
.login-err { color: var(--red); font-size: 14px; }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { transition: none !important; scroll-behavior: auto !important; } }
@media (max-width: 900px) {
  body::before { display: none; }
  .topbar { margin: 10px 12px 0; flex-direction: column; align-items: flex-start; }
  .topbar-actions { width: 100%; justify-content: flex-start; }
  .chat-layout { padding-left: 0; }
  .messages { width: calc(100vw - 24px); padding: 24px 0 190px; }
  .composer-wrapper { left: 0; padding: 14px 12px; }
  .composer, .composer-hint { width: calc(100vw - 24px); }
  .message-bubble { max-width: 86vw; }
  .row, .history-lookup { grid-template-columns: 1fr; }
}
@media (max-width: 560px) {
  .brand-title { font-size: 21px; }
  .hospital-inline input { width: 112px; }
  .composer { align-items: stretch; flex-direction: column; }
  #sendButton { width: 100%; }
  .composer-hint { flex-direction: column; gap: 4px; }
}
</style>
</head>
<body>

<!-- 登录页面 -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <h2>核心制度指标 Agent</h2>
    <div class="subtitle">请选择身份并输入账号</div>
    <div class="role-tabs">
      <button class="role-tab active" data-role="hospital">医院人员</button>
      <button class="role-tab" data-role="company">公司人员</button>
    </div>
    <label>账号</label>
    <input id="loginAccount" type="text" placeholder="请输入账号" value="user_001" />
    <label>密码（暂不校验）</label>
    <input id="loginPassword2" type="password" placeholder="请输入密码" value="" />
    <div id="loginError2" class="login-err" hidden></div>
    <button id="loginSubmit2">进入系统</button>
  </div>
</div>

<div class="app-shell">
  <header class="topbar">
    <div class="brand">
      <div class="brand-title">核心制度指标 Agent</div>
      <div class="brand-subtitle">本地 Markdown Wiki：医院口径优先，回退公司标准和国标。</div>
    </div>
    <div class="topbar-actions">
      <span id="userInfo" class="user-info"></span>
      <label class="hospital-inline"><span>医院</span><input id="hospitalId" value="hospital_001" /></label>
      <button id="mcpButton" class="btn btn-ghost">MCP</button>
      <button id="reviewButton" class="btn btn-secondary">审批</button>
      <button id="newSessionButton" class="btn btn-ghost">新会话</button>
    </div>
  </header>

  <main class="chat-layout">
    <section id="messages" class="messages" aria-live="polite"></section>
  </main>

  <footer class="composer-wrapper">
    <form id="chatForm" class="composer">
      <textarea id="queryInput" rows="1" placeholder="输入问题，例如：急会诊及时到位率怎么算？"></textarea>
      <button id="sendButton" type="submit">发送</button>
    </form>
    <div class="composer-hint">
      <span>默认使用 Ollama 流式生成；失败或事实校验未通过时自动回退知识库工具答案。</span>
      <span id="sessionLabel"></span>
    </div>
  </footer>
</div>

<!-- MCP 测试弹窗 -->
<div id="mcpModal" class="modal" hidden>
  <section class="dialog" role="dialog" aria-modal="true">
    <header>
      <div><h2>DBHub MCP 测试</h2><div style="color:#5b677a;font-size:14px;">查看本地数据库工具，并通过 DBHub 同步元数据。</div></div>
      <button class="ghost" data-close="mcpModal">关闭</button>
    </header>
    <div class="dialog-body">
      <div class="mcp-panel">
        <div class="mcp-toolbar">
          <button id="loadMcpSourcesButton" type="button">查看数据源/工具</button>
          <select id="mcpDbSelect" aria-label="选择数据库">
            <option value="hospital_demo_data">hospital_demo_data</option>
            <option value="wiki_agent_runtime">wiki_agent_runtime</option>
          </select>
          <button id="syncMcpMetadataButton" type="button">通过 DBHub 同步元数据</button>
        </div>
        <div id="mcpStatus" class="mcp-status">点击“查看数据源/工具”确认 DBHub sidecar 是否已连接。</div>
        <div id="mcpSourceList" class="mcp-source-grid"></div>
      </div>
    </div>
  </section>
</div>

<!-- 口径差异确认弹窗 -->
<div id="feedbackModal" class="modal" hidden>
  <section class="dialog" role="dialog" aria-modal="true">
    <header>
      <div><h2>口径差异确认</h2><div id="feedbackMeta" style="color:#5b677a;font-size:14px;"></div></div>
      <button class="ghost" data-close="feedbackModal">关闭</button>
    </header>
    <div class="dialog-body"><div id="comparison" class="comparison"></div></div>
  </section>
</div>

<!-- 管理员登录弹窗 -->
<div id="loginModal" class="modal" hidden>
  <section class="dialog" role="dialog" aria-modal="true" style="width:min(440px,100%);">
    <header>
      <div><h2>管理员登录</h2></div>

function optionText(option) {
  if (!option) return "未配置";
  return [option.definition, option.formula, option.implementation||option.implementation_status||""].filter(function(x){return !!x;}).join("\n").trim()||"未配置";
}

function parseSseEvent(raw) {
  var lines = raw.split("\n");
  var event = "message", data = "";
  for (var i = 0; i < lines.length; i++) {
    if (lines[i].startsWith("event:")) event = lines[i].slice(6).trim();
    if (lines[i].startsWith("data:")) data += lines[i].slice(5).trim();
  }
  if (!data) return { event: event, data: {} };
  try { return { event: event, data: JSON.parse(data) }; }
  catch(e) { return { event: event, data: {text:data} }; }
}

function _renderAssHtml(text) {
  return (text || "").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/\*\*(.+?)\*\*/g, "<b>$1</b>")
    .replace(/`([^`]+)`/g, "<code style='background:#e8e8e8;padding:1px 5px;border-radius:3px;'>$1</code>")
    .replace(/✅/g, "<span style='color:#2e7d32'>✅</span>")
    .replace(/❌/g, "<span style='color:#c62828'>❌</span>")
    .replace(/(📋|📐|⚙️|🧪|💡)/g, '<span style="font-size:16px;">$1</span>');
}

async function showTrace(traceId) {
  traceModal.hidden = false;
  traceMeta.textContent = traceId;
  traceNodeList.innerHTML = "正在加载链路...";
  try {
    var resp = await fetch("/api/traces/" + encodeURIComponent(traceId));
    var data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || "链路加载失败");
    traceNodeList.innerHTML = "";
    var nodes = data.nodes || [];
    if (!nodes.length) { traceNodeList.textContent = "暂无节点记录。"; return; }
    nodes.forEach(function(node) {
      var box = document.createElement("div");
      box.className = "review-item trace-node " + (node.status || "");
      var titleRow = document.createElement("div");
      titleRow.className = "trace-title-row";
      var titleWrap = document.createElement("div");
      var title = document.createElement("div");
      title.className = "trace-title";
      title.textContent = node.node_title || node.node_name || "未知节点";
      var nodeId = document.createElement("div");
      nodeId.className = "review-meta";
      nodeId.textContent = node.node_name || "unknown";
      titleWrap.append(title, nodeId);
      var status = document.createElement("span");
      status.className = "trace-status";
      status.textContent = node.status || "unknown";
      titleRow.append(titleWrap, status);
      var meta = document.createElement("div");
      meta.className = "review-meta";
      meta.textContent = "类型：" + (node.manifest_type || node.node_type || "") + "  耗时：" + (node.duration_ms || 0) + "ms" + (node.tool_name ? "  工具：" + node.tool_name : "") + (node.db_source ? "  数据源：" + node.db_source : "");
      var desc = document.createElement("div");
      desc.className = "trace-desc";
      desc.textContent = node.node_description || "";
      box.append(titleRow, meta);
      if (desc.textContent) box.appendChild(desc);
      appendTraceSection(box, "本次入参", node.input_data, node.input_summary || "无");
      appendTraceSection(box, "本次出参", node.output_data, node.output_summary || "无");
      appendTraceSection(box, "节点配置", node.config_data && Object.keys(node.config_data).length ? node.config_data : node.node_config, "无");
      var fields = document.createElement("div");
      fields.className = "trace-field-list";
      fields.textContent = "期望入参：" + ((node.expected_inputs || []).join(", ") || "无") + "  |  期望出参：" + ((node.expected_outputs || []).join(", ") || "无");
      box.appendChild(fields);
      if (node.failure_hint) {
        var hint = document.createElement("div");
        hint.className = "trace-hint";
        hint.textContent = "定位建议：" + node.failure_hint;
        box.appendChild(hint);
      }
      if (node.error_message) {
        var err = document.createElement("div");
        err.style.color = "#a64536";
        err.textContent = "错误：" + node.error_message;
        box.appendChild(err);
      }
      traceNodeList.appendChild(box);
    });
  } catch (e) {
    traceNodeList.textContent = "链路加载失败：" + (e.message || e);
  }
}

function formatTraceValue(value, fallback) {
  if (value === undefined || value === null || value === "") return fallback || "无";
  if (typeof value === "object") {
    if (Array.isArray(value) && !value.length) return fallback || "无";
    if (!Array.isArray(value) && !Object.keys(value).length) return fallback || "无";
    return JSON.stringify(value, null, 2);
  }
  return String(value);
}

function appendTraceSection(parent, title, value, fallback) {
  var section = document.createElement("div");
  section.className = "trace-section";
  var heading = document.createElement("div");
  heading.className = "trace-section-title";
  heading.textContent = title;
  var body = document.createElement("pre");
  body.className = "trace-json";
  body.textContent = formatTraceValue(value, fallback);
  section.append(heading, body);
  parent.appendChild(section);
}

// ===== 流式对话 =====
async function streamChat(query) {
  var hospitalId = hospitalIdInput.value.trim() || "hospital_001";
  createMessage("user", query);
  var ass = createMessage("agent", "");
  sendButton.disabled = true;
  queryInput.disabled = true;
  try {
    var resp = await fetch("/api/chat/stream", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ query: query, hospital_id: hospitalId, session_id: currentSessionId, use_llm: true }),
    });
    if (!resp.ok) throw new Error(await resp.text());
    if (!resp.body) throw new Error("浏览器不支持流式读取");
    var reader = resp.body.getReader();
    var decoder = new TextDecoder("utf-8");
    var buffer = "";
    while (true) {
      var chunk = await reader.read();
      if (chunk.done) break;
      buffer += decoder.decode(chunk.value, { stream: true });
      var blocks = buffer.split("\n\n");
      buffer = blocks.pop() || "";
      for (var i = 0; i < blocks.length; i++) {
        var parsed = parseSseEvent(blocks[i]);
        if (!parsed) continue;
        if (parsed.event === "meta" && parsed.data.session_id) {
          currentSessionId = parsed.data.session_id;
          sessionLabel.textContent = "session: " + currentSessionId;
          if (parsed.data.trace_id) {
            latestTraceId = parsed.data.trace_id;
            ass.traceId = parsed.data.trace_id;
          }
        }
        if (parsed.event === "progress") {
          var progressText = parsed.data.message || "\u6b63\u5728\u5904\u7406";
          ass.meta.textContent = "\u6838\u5fc3\u5236\u5ea6\u6307\u6807 Agent - " + progressText;
          if (!(ass._raw || "")) {
            ass.body.innerHTML = "<span style='color:#6b7f99'>" + _renderAssHtml(progressText) + "...</span>";
          }
          scrollToBottom();
        }
        if (parsed.event === "token") {
          ass._raw = (ass._raw || "") + (parsed.data.text || "");
          ass.body.innerHTML = _renderAssHtml(ass._raw);
          scrollToBottom();
        }
        if (parsed.event === "feedback_preview") { latestFeedbackPreview = parsed.data; showFeedbackPreview(parsed.data); }
        if (parsed.event === "error") { ass.meta.textContent = "\u6838\u5fc3\u5236\u5ea6\u6307\u6807 Agent - \u8bf7\u6c42\u5931\u8d25"; ass.body.textContent += "\n\n[\u9519\u8bef] " + (parsed.data.message||"\u8bf7\u6c42\u5931\u8d25"); scrollToBottom(); }
        if (parsed.event === "done") {
          if (parsed.data.trace_id) {
            latestTraceId = parsed.data.trace_id;
            ass.traceId = parsed.data.trace_id;
          }
          ass.meta.textContent = "\u6838\u5fc3\u5236\u5ea6\u6307\u6807 Agent - \u5df2\u5b8c\u6210";
          attachTraceButton(ass, ass.traceId || latestTraceId);
        }
      }
    }
  } catch(e) { ass.body.textContent = "[请求失败] " + (e.message||e); }
  finally { sendButton.disabled = false; queryInput.disabled = false; queryInput.focus(); scrollToBottom(); }
}

// ===== 反馈弹窗 =====
function renderDiffTable(changes) {
  if (!changes || !changes.length) return;
  var table = document.createElement("table");
  table.className = "diff-table";
  table.innerHTML = "<thead><tr><th>字段</th><th>用户反馈值</th><th>当前生效值</th><th>变更</th></tr></thead>";
  var tbody = document.createElement("tbody");
  changes.forEach(function(ch) {
    var tr = document.createElement("tr");
    if (ch.changed) tr.className = "changed";
    tr.innerHTML = "<td>" + ch.field + "</td><td>" + (ch.requested||"（无）") + "</td><td>" + (ch.current||"（无）") + "</td><td>" + (ch.changed ? '<span class="changed-badge">已变更</span>' : "—") + "</td>";
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  comparison.appendChild(table);
}

function renderFeedbackRow(titleText, option, mode, preview) {
  var row = document.createElement("div");
  row.className = "row";
  var title = document.createElement("div");
  title.className = "row-title";
  title.textContent = titleText;
  var content = document.createElement("div");
  content.className = "row-content";
  content.textContent = optionText(option);
  var actions = document.createElement("div");
  if (mode === "submit") {
    var btn = document.createElement("button");
    btn.textContent = "提交为本院口径";
    btn.disabled = !option || (!option.formula && !option.definition);
    btn.addEventListener("click", function() { submitChangeRequest(preview, option); });
    actions.appendChild(btn);
  } else {
    var keepBtn = document.createElement("button");
    keepBtn.className = "ghost";
    keepBtn.textContent = "保持当前口径";
    keepBtn.addEventListener("click", function() { feedbackModal.hidden = true; });
    actions.appendChild(keepBtn);
  }
  row.append(title, content, actions);
  comparison.appendChild(row);
}

function showFeedbackPreview(preview) {
  feedbackMeta.textContent = preview.rule_name + " · " + preview.hospital_id + " · 当前采用：" + levelName(preview.current_effective_level);
  comparison.innerHTML = "";
  renderDiffTable(preview.field_changes);
  var requested = preview.requested;
  var current = preview.current_effective;
  if (!current || (!current.definition && !current.formula)) {
    current = preview.current_hospital || preview.company || preview.national || {};
  }
  renderFeedbackRow("用户反馈口径", requested, "submit", preview);
  renderFeedbackRow("当前医院执行口径", current, "keep", preview);
  feedbackModal.hidden = false;
}

async function submitChangeRequest(preview, option) {
  var payload = {
    rule_id: preview.rule_id, indicator_name: preview.rule_name,
    hospital_id: preview.hospital_id, target_level: "hospital",
    requested_definition: option.definition||"",
    requested_formula: option.formula||option.source_text||"",
    hospital_feedback: preview.requested.source_text||"",
    original_user_message: preview.requested.source_text||"",
    change_type: "本院口径反馈",
    submitter_id: currentUser ? currentUser.accountId : "unknown",
    submitter_role: currentUser ? currentUser.role : "unknown",
  };
  var resp = await fetch("/api/review/change-requests", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload) });
  var data = await resp.json();
  if (!resp.ok) throw new Error(data.detail||"request failed");
  feedbackModal.hidden = true;
  createMessage("agent", "已提交待审批：" + data.change_id);
}

// ===== 审批功能 =====
async function loadPendingReviews() {
  historyHospitalInput.value = hospitalIdInput.value || "hospital_001";
  reviewList.innerHTML = "";
  var resp = await fetch("/api/review/pending", { headers:{"Authorization":"Bearer " + adminToken} });
  if (resp.status === 401 || resp.status === 403) {
    adminToken = ""; sessionStorage.removeItem("adminToken"); updateAdminUI();
    reviewList.innerHTML = '<div style="color:#9f1d35;">登录已过期，请重新登录。</div>';
    return;
  }
  var data = await resp.json();
  if (!data.items.length) {
    reviewList.innerHTML = '<div style="color:#5b677a;">当前没有待审批口径。</div>';
    return;
  }
  for (var idx = 0; idx < data.items.length; idx++) {
    let item = data.items[idx];
    var box = document.createElement("div");
    box.className = "review-item";
    var title = document.createElement("strong");
    title.textContent = item.change_id + " · " + (item.indicator_name||item.rule_id) + " · " + item.hospital_id;

    var metaLine = document.createElement("div");
    metaLine.className = "review-meta";
    var submitterRole = item.submitter_role === "company" ? "公司人员" : "医院人员";
    metaLine.textContent = "提交人：" + (item.submitter_id||"unknown") + "（" + submitterRole + "）  提交时间：" + (item.created_at||"unknown");
    box.append(title, metaLine);

    var body = document.createElement("div");
    body.className = "row-content";
    body.textContent = ["【申请变更】", item.requested_definition, item.requested_formula, item.hospital_feedback].filter(function(x){return !!x;}).join("\n");

    var refDiv = document.createElement("div");
    refDiv.textContent = "加载参考口径…";
    box.append(title, body, refDiv);

    let ruleId = item.rule_id, hospitalId = item.hospital_id;
    (async function(item, ruleId, hospitalId, refDiv, box) {
      if (ruleId && hospitalId) {
        try {
          var refResp = await fetch("/api/kb/rules/" + encodeURIComponent(ruleId) + "/effective?hospital_id=" + encodeURIComponent(hospitalId));
          if (refResp.ok) {
            var ref = await refResp.json();
            var hRef = ref.hospital_override||{}, cRef = ref.company_rule||{}, nRef = ref.national_rule||{};
            var tbl = document.createElement("table");
            tbl.className = "diff-table";
            tbl.innerHTML = "<thead><tr><th>字段</th><th>申请值</th><th>当前医院</th><th>公司标准</th><th>国标</th></tr></thead>";
            var tbody = document.createElement("tbody");
            [["指标定义","requested_definition","definition"],["计算公式","requested_formula","formula"]].forEach(function(fld) {
              var tr = document.createElement("tr");
              tr.innerHTML = "<td>" + fld[0] + "</td><td>" + (item[fld[1]]||"（无）") + "</td><td>" + (hRef[fld[2]]||"未配置") + "</td><td>" + (cRef[fld[2]]||cRef["implementation_status"]||"未配置") + "</td><td>" + (nRef[fld[2]]||"未配置") + "</td>";
              tbody.appendChild(tr);
            });
            tbl.appendChild(tbody);
            refDiv.innerHTML = ""; refDiv.appendChild(tbl);
          } else { refDiv.textContent = "参考口径加载失败"; }
        } catch(e) { refDiv.textContent = "参考口径加载失败"; }
      } else { refDiv.textContent = ""; }
    })(item, ruleId, hospitalId, refDiv, box);

    var actions = document.createElement("div");
    actions.className = "review-actions";
    var approve = document.createElement("button");
    approve.textContent = "确认通过";
    approve.addEventListener("click", function() { approveChange(item.change_id); });
    var history = document.createElement("button");
    history.className = "ghost";
    history.textContent = "历史版本";
    history.addEventListener("click", function() { showOverrideHistory(ruleId, hospitalId, item.indicator_name||item.rule_id); });
    var reject = document.createElement("button");
    reject.className = "danger";
    reject.textContent = "拒绝";
    reject.addEventListener("click", function() { rejectChange(item.change_id); });
    actions.append(history, approve, reject);
    box.append(actions);
    reviewList.appendChild(box);
  }
}

async function approveChange(changeId) {
  var resp = await fetch("/api/review/change-requests/" + changeId + "/approve", {
    method:"POST", headers:{"Authorization":"Bearer " + adminToken, "Content-Type":"application/json"},
    body:JSON.stringify({ approver_id: currentUser ? currentUser.accountId : "admin" })
  });
  var data = await resp.json();
  if (!resp.ok) throw new Error(data.detail||"approve failed");
  createMessage("agent", "已生效到医院口径：" + data.override_path + "\n审批人：" + (data.approver_id||"") + "  时间：" + (data.approved_at||""));
  await loadPendingReviews();
}

async function rejectChange(changeId) {
  var resp = await fetch("/api/review/change-requests/" + changeId + "/reject", {
    method:"POST", headers:{"Authorization":"Bearer " + adminToken, "Content-Type":"application/json"},
    body:JSON.stringify({ approver_id: currentUser ? currentUser.accountId : "admin" })
  });
  var data = await resp.json();
  if (!resp.ok) throw new Error(data.detail||"reject failed");
  createMessage("agent", "已拒绝：" + changeId + "\n审批人：" + (data.approver_id||"") + "  时间：" + (data.rejected_at||""));
  await loadPendingReviews();
}

async function showOverrideHistory(ruleId, hospitalId, title) {
  if (!ruleId || !hospitalId) return;
  historyMeta.textContent = (title||ruleId) + " · " + hospitalId;
  historyList.innerHTML = "加载历史版本…";
  historyModal.hidden = false;
  var resp = await fetch("/api/review/hospital-overrides/" + encodeURIComponent(hospitalId) + "/" + encodeURIComponent(ruleId) + "/versions", {
    headers:{"Authorization":"Bearer " + adminToken}
  });
  var data = await resp.json();
  if (!resp.ok) { historyList.textContent = data.detail || "历史版本加载失败"; return; }
  historyList.innerHTML = "";
  if (!data.versions.length) { historyList.textContent = "暂无历史版本。"; return; }
  data.versions.slice().reverse().forEach(function(version) {
    var box = document.createElement("div");
    box.className = "version-item" + (version.version_id === data.active_version_id ? " active" : "");
    var head = document.createElement("strong");
    head.textContent = (version.version_id === data.active_version_id ? "\u5f53\u524d\u751f\u6548 \u00b7 " : "") + version.version_id;
    var meta = document.createElement("div");
    meta.className = "version-meta";
    meta.textContent = "来源：" + (version.source||"approval") + "  审批人：" + (version.approver_id||"unknown") + "  时间：" + (version.approved_at||"unknown");
    var table = document.createElement("table");
    table.className = "diff-table";
    table.innerHTML = "<tbody><tr><th>指标定义</th><td></td></tr><tr><th>计算公式</th><td></td></tr></tbody>";
    table.rows[0].cells[1].textContent = version.definition || "（无）";
    table.rows[1].cells[1].textContent = version.formula || "（无）";
    var actions = document.createElement("div");
    actions.className = "review-actions";
    var restore = document.createElement("button");
    restore.textContent = version.version_id === data.active_version_id ? "当前生效" : "恢复此版本";
    restore.disabled = version.version_id === data.active_version_id;
    restore.addEventListener("click", function() { restoreOverrideVersion(ruleId, hospitalId, version.version_id); });
    actions.append(restore);
    box.append(head, meta, table, actions);
    historyList.appendChild(box);
  });
}

async function restoreOverrideVersion(ruleId, hospitalId, versionId) {
  var resp = await fetch("/api/review/hospital-overrides/" + encodeURIComponent(hospitalId) + "/" + encodeURIComponent(ruleId) + "/versions/" + encodeURIComponent(versionId) + "/restore", {
    method:"POST",
    headers:{"Authorization":"Bearer " + adminToken, "Content-Type":"application/json"},
    body:JSON.stringify({ approver_id: currentUser ? currentUser.accountId : "admin" })
  });
  var data = await resp.json();
  if (!resp.ok) { alert(data.detail || "恢复失败"); return; }
  createMessage("agent", "已恢复医院历史口径：" + data.active_version_id + "\n恢复人：" + (data.approver_id||""));
  await showOverrideHistory(ruleId, hospitalId, "已恢复");
}

// ===== KB merge =====
function switchReviewTab(tab) {
  var isMerge = tab === "merge";
  caliberReviewTab.classList.toggle("active", !isMerge);
  kbMergeTab.classList.toggle("active", isMerge);
  caliberReviewPanel.hidden = isMerge;
  kbMergePanel.hidden = !isMerge;
  if (isMerge) loadMergeReports();
}

caliberReviewTab.addEventListener("click", function() { switchReviewTab("caliber"); loadPendingReviews(); });
kbMergeTab.addEventListener("click", function() { switchReviewTab("merge"); });

exportKbButton.addEventListener("click", function() {

  window.open("/api/kb/export?hospital_id=" + encodeURIComponent(hospitalId), "_blank");
});

refreshMergeReportsButton.addEventListener("click", loadMergeReports);

mergeUploadInput.addEventListener("change", async function() {
  var file = mergeUploadInput.files && mergeUploadInput.files[0];
  if (!file) return;
  mergeReportDetail.textContent = "\u6b63\u5728\u4e0a\u4f20\u5e76\u751f\u6210\u5dee\u5f02\u62a5\u544a...";
  try {
    var resp = await fetch("/api/kb/merge/upload", {
      method: "POST",
      headers: {"Authorization":"Bearer " + adminToken, "Content-Type":"application/zip"},
      body: await file.arrayBuffer()
    });
    var data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || "upload failed");
    mergeReportDetail.textContent = "\u5df2\u751f\u6210\u5408\u5e76\u62a5\u544a\uff1a" + data.report_id;
    await loadMergeReports();
    await showMergeReport(data.report_id);
  } catch (e) {
    mergeReportDetail.textContent = "\u4e0a\u4f20\u5931\u8d25\uff1a" + (e.message || e);
  } finally {
    mergeUploadInput.value = "";
  }
});

async function loadMergeReports() {
  if (!adminToken) return;
  mergeReportList.innerHTML = "\u52a0\u8f7d\u5408\u5e76\u62a5\u544a...";
  try {
    var resp = await fetch("/api/kb/merge/reports", { headers:{"Authorization":"Bearer " + adminToken} });
    var data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || "load failed");
    mergeReportList.innerHTML = "";
    if (!data.items.length) { mergeReportList.textContent = "\u6682\u65e0\u5408\u5e76\u62a5\u544a\u3002"; return; }
    data.items.forEach(function(report) {
      var btn = document.createElement("button");
      btn.type = "button";
      btn.className = "merge-report-item";
      var summary = report.summary || {};
      btn.innerHTML = "<strong>" + report.report_id + " · " + report.hospital_id + "</strong>" +
        "<span>" + (report.status || "") + " \u00b7 \u51b2\u7a81 " + (summary.conflicts||0) + " \u00b7 \u65b0\u89c4\u5219 " + (summary.new_rules||0) + " \u00b7 \u65b0\u6307\u6807 " + (summary.new_indicators||0) + "</span>";
      btn.addEventListener("click", function() { showMergeReport(report.report_id); });
      mergeReportList.appendChild(btn);
    });
  } catch(e) { mergeReportList.textContent = "\u5408\u5e76\u62a5\u544a\u52a0\u8f7d\u5931\u8d25\uff1a" + (e.message || e); }
}

async function showMergeReport(reportId) {
  mergeReportDetail.textContent = "\u52a0\u8f7d\u62a5\u544a\u8be6\u60c5...";
  var resp = await fetch("/api/kb/merge/report/" + encodeURIComponent(reportId), { headers:{"Authorization":"Bearer " + adminToken} });
  var report = await resp.json();
  if (!resp.ok) { mergeReportDetail.textContent = report.detail || "load failed"; return; }
  renderMergeReport(report);
}

function renderMergeReport(report) {
  mergeReportDetail.innerHTML = "";
  var title = document.createElement("h3");
  title.textContent = report.report_id + " · " + report.hospital_id;
  mergeReportDetail.appendChild(title);
  (report.items || []).forEach(function(item) {
    var box = document.createElement("div");
    box.className = "merge-item " + (item.status || "pending");
    var head = document.createElement("strong");
    head.textContent = item.item_id + " · " + item.type + " · " + (item.rule_name || item.indicator_name || item.rule_id || "");
    var table = document.createElement("table");
    table.className = "diff-table";
    table.innerHTML = "<tbody><tr><th>\u5b57\u6bb5</th><td></td></tr><tr><th>\u533b\u9662\u503c</th><td></td></tr><tr><th>\u516c\u53f8\u503c</th><td></td></tr><tr><th>\u72b6\u6001</th><td></td></tr></tbody>";
    table.rows[0].cells[1].textContent = item.field || "";
    table.rows[1].cells[1].textContent = JSON.stringify(item.hospital_value || item.files || "", null, 2);
    table.rows[2].cells[1].textContent = JSON.stringify(item.company_value || "", null, 2);
    table.rows[3].cells[1].textContent = (item.status || "") + (item.decision ? " / " + item.decision : "");
    var actions = document.createElement("div");
    actions.className = "review-actions";
    if (item.status === "pending") {
      var candidate = document.createElement("button");
      candidate.textContent = "\u91c7\u7eb3\u4e3a\u516c\u53f8\u5019\u9009";
      candidate.addEventListener("click", function() { approveMergeItem(report.report_id, item.item_id, "adopt_as_company_candidate"); });
      var local = document.createElement("button");
      local.className = "ghost";
      local.textContent = "\u4fdd\u7559\u4e3a\u533b\u9662\u672c\u5730";
      local.addEventListener("click", function() { approveMergeItem(report.report_id, item.item_id, "keep_as_hospital_local"); });
      var reject = document.createElement("button");
      reject.className = "danger";
      reject.textContent = "\u62d2\u7edd";
      reject.addEventListener("click", function() { rejectMergeItem(report.report_id, item.item_id); });
      actions.append(candidate, local, reject);
    }
    box.append(head, table, actions);
    mergeReportDetail.appendChild(box);
  });
}

async function approveMergeItem(reportId, itemId, decision) {
  var resp = await fetch("/api/kb/merge/report/" + encodeURIComponent(reportId) + "/items/" + encodeURIComponent(itemId) + "/approve", {
    method:"POST",
    headers:{"Authorization":"Bearer " + adminToken, "Content-Type":"application/json"},
    body:JSON.stringify({decision: decision, approver_id: currentUser ? currentUser.accountId : "admin"})
  });
  var data = await resp.json();
  if (!resp.ok) { alert(data.detail || "approve failed"); return; }
  await showMergeReport(reportId);
  await loadMergeReports();
}

async function rejectMergeItem(reportId, itemId) {
  var reason = prompt("\u8bf7\u8f93\u5165\u62d2\u7edd\u539f\u56e0", "");
  var resp = await fetch("/api/kb/merge/report/" + encodeURIComponent(reportId) + "/items/" + encodeURIComponent(itemId) + "/reject", {
    method:"POST",
    headers:{"Authorization":"Bearer " + adminToken, "Content-Type":"application/json"},
    body:JSON.stringify({reason: reason || "", approver_id: currentUser ? currentUser.accountId : "admin"})
  });
  var data = await resp.json();
  if (!resp.ok) { alert(data.detail || "reject failed"); return; }
  await showMergeReport(reportId);
  await loadMergeReports();
}
