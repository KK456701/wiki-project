<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>核心制度指标 Agent</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Microsoft YaHei", Arial, sans-serif;
        background: #f6f7f9;
        color: #1f2937;
      }
      body { margin: 0; }
      main { max-width: 1080px; margin: 0 auto; padding: 24px; }
      header { display: flex; justify-content: space-between; gap: 16px; align-items: center; margin-bottom: 18px; }
      h1 { font-size: 24px; margin: 0; }
      h2 { font-size: 18px; margin: 18px 0 10px; }
      .toolbar { display: flex; gap: 10px; align-items: center; }
      .panel { background: #fff; border: 1px solid #d9dee7; border-radius: 8px; padding: 16px; }
      .controls { display: grid; grid-template-columns: 180px 1fr 84px; gap: 10px; }
      input, textarea, button { font: inherit; }
      input, textarea { border: 1px solid #c9d0dc; border-radius: 6px; padding: 10px; }
      textarea { min-height: 92px; resize: vertical; }
      button { border: 0; border-radius: 6px; padding: 0 16px; background: #116a7b; color: white; cursor: pointer; }
      button.secondary { background: #475467; min-height: 36px; }
      button.ghost { background: #edf2f7; color: #344054; border: 1px solid #c9d0dc; }
      button.danger { background: #9f1d35; }
      button:disabled { background: #8795a1; cursor: wait; }
      .meta { color: #5b677a; font-size: 14px; }
      .mode-row { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-top: 12px; color: #344054; }
      .messages { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; min-height: 260px; }
      .message { max-width: 86%; border-radius: 8px; padding: 12px 14px; line-height: 1.55; white-space: pre-wrap; overflow-wrap: anywhere; }
      .message.user { align-self: flex-end; background: #e6f3f6; color: #12343b; }
      .message.assistant { align-self: flex-start; background: #111827; color: #f9fafb; }
      .message.system { align-self: center; background: #fff7e6; color: #5f4300; border: 1px solid #f2d08a; }
      .message .label { display: block; opacity: 0.72; font-size: 12px; margin-bottom: 6px; }
      .modal[hidden] { display: none; }
      .modal { position: fixed; inset: 0; background: rgba(17, 24, 39, 0.48); display: grid; place-items: center; padding: 20px; z-index: 20; }
      .dialog { width: min(920px, 100%); max-height: 88vh; overflow: auto; background: #fff; border-radius: 8px; border: 1px solid #d9dee7; box-shadow: 0 20px 50px rgba(15, 23, 42, 0.22); }
      .dialog header { padding: 16px; margin: 0; border-bottom: 1px solid #e4e7ec; }
      .dialog-body { padding: 16px; }
      .comparison { display: grid; gap: 10px; }
      .row { display: grid; grid-template-columns: 120px 1fr 150px; gap: 10px; align-items: stretch; padding: 12px; border: 1px solid #e4e7ec; border-radius: 8px; }
      .row-title { font-weight: 700; color: #111827; }
      .row-content { color: #344054; white-space: pre-wrap; overflow-wrap: anywhere; }
      .review-list { display: grid; gap: 10px; }
      .review-item { border: 1px solid #e4e7ec; border-radius: 8px; padding: 12px; display: grid; gap: 8px; }
      .review-actions { display: flex; gap: 8px; justify-content: flex-end; }
      @media (max-width: 760px) {
        main { padding: 16px; }
        header { align-items: flex-start; flex-direction: column; }
        .toolbar, .mode-row { align-items: flex-start; flex-direction: column; }
        .controls, .row { grid-template-columns: 1fr; }
        button { min-height: 42px; }
        .message { max-width: 100%; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>核心制度指标 Agent</h1>
          <div class="meta">本地 Markdown Wiki：医院口径优先，回退公司标准和国标。</div>
        </div>
        <div class="toolbar">
          <button id="reviewButton" class="secondary">审批</button>
          <button id="newSession" class="ghost">新会话</button>
        </div>
      </header>

      <section class="panel">
        <div class="controls">
          <input id="hospitalId" value="hospital_001" aria-label="医院 ID" />
          <textarea id="query" aria-label="问题">急会诊及时到位率怎么算？</textarea>
          <button id="send">发送</button>
        </div>
        <div class="mode-row">
          <span>默认使用 Ollama 生成最终回答；失败或事实校验未通过时自动回退知识库工具答案。</span>
          <span id="sessionLabel" class="meta"></span>
        </div>
        <h2>对话</h2>
        <div id="messages" class="messages"></div>
      </section>
    </main>

    <div id="feedbackModal" class="modal" hidden>
      <section class="dialog" role="dialog" aria-modal="true" aria-labelledby="feedbackTitle">
        <header>
          <div>
            <h2 id="feedbackTitle">口径差异确认</h2>
            <div id="feedbackMeta" class="meta"></div>
          </div>
          <button class="ghost" data-close="feedbackModal">关闭</button>
        </header>
        <div class="dialog-body">
          <div id="comparison" class="comparison"></div>
        </div>
      </section>
    </div>

    <div id="reviewModal" class="modal" hidden>
      <section class="dialog" role="dialog" aria-modal="true" aria-labelledby="reviewTitle">
        <header>
          <div>
            <h2 id="reviewTitle">待审批口径</h2>
            <div class="meta">审批通过后只生效到当前医院口径。</div>
          </div>
          <button class="ghost" data-close="reviewModal">关闭</button>
        </header>
        <div class="dialog-body">
          <div id="reviewList" class="review-list"></div>
        </div>
      </section>
    </div>

    <script>
      const button = document.querySelector("#send");
      const newSessionButton = document.querySelector("#newSession");
      const reviewButton = document.querySelector("#reviewButton");
      const messages = document.querySelector("#messages");
      const queryInput = document.querySelector("#query");
      const hospitalInput = document.querySelector("#hospitalId");
      const sessionLabel = document.querySelector("#sessionLabel");
      const feedbackModal = document.querySelector("#feedbackModal");
      const feedbackMeta = document.querySelector("#feedbackMeta");
      const comparison = document.querySelector("#comparison");
      const reviewModal = document.querySelector("#reviewModal");
      const reviewList = document.querySelector("#reviewList");
      let sessionId = localStorage.getItem("coreRulesSessionId") || null;
      let latestFeedbackPreview = null;

      function updateSessionLabel() {
        sessionLabel.textContent = sessionId ? `session: ${sessionId.slice(0, 8)}` : "session: new";
      }

      function addMessage(role, content, method = "") {
        const item = document.createElement("div");
        item.className = `message ${role}`;
        const label = document.createElement("span");
        label.className = "label";
        label.textContent = role === "user" ? "你" : (method ? `Agent - ${method}` : "Agent");
        const body = document.createElement("span");
        body.textContent = content;
        item.append(label, body);
        messages.appendChild(item);
        item.scrollIntoView({ block: "nearest" });
        return body;
      }

      function parseSseBlock(block) {
        const eventLine = block.split("\n").find((line) => line.startsWith("event:"));
        const dataLine = block.split("\n").find((line) => line.startsWith("data:"));
        if (!eventLine || !dataLine) return null;
        return { event: eventLine.slice(6).trim(), data: JSON.parse(dataLine.slice(5).trim()) };
      }

      async function streamChat(query) {
        const assistantBody = addMessage("assistant", "", "stream");
        const response = await fetch("/api/chat/stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            hospital_id: hospitalInput.value.trim() || "hospital_001",
            query,
            session_id: sessionId,
            use_llm: true,
          }),
        });
        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let buffer = "";
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const blocks = buffer.split("\n\n");
          buffer = blocks.pop() || "";
          for (const block of blocks) {
            const parsed = parseSseBlock(block);
            if (!parsed) continue;
            if (parsed.event === "meta") {
              if (parsed.data.session_id) {
                sessionId = parsed.data.session_id;
                localStorage.setItem("coreRulesSessionId", sessionId);
                updateSessionLabel();
              }
            }
            if (parsed.event === "token") assistantBody.textContent += parsed.data.text || "";
            if (parsed.event === "feedback_preview") {
              latestFeedbackPreview = parsed.data;
              showFeedbackPreview(parsed.data);
            }
            if (parsed.event === "done") {
              if (parsed.data.session_id) {
                sessionId = parsed.data.session_id;
                localStorage.setItem("coreRulesSessionId", sessionId);
                updateSessionLabel();
              }
            }
            if (parsed.event === "error") assistantBody.textContent += `
请求失败：${parsed.data.message}`;
          }
        }
      }

      function optionTitle(option) {
        const names = { requested: "用户反馈口径", configured: "当前医院口径", not_configured: "当前医院口径", company: "公司口径", national: "国标口径" };
        if (option.status === "requested") return names.requested;
        if (option.level === "hospital") return names[option.status] || names.configured;
        return names[option.level] || option.level;
      }

      function showFeedbackPreview(preview) {
        feedbackMeta.textContent = `${preview.rule_name} ? ${preview.hospital_id} ? 当前采用 ${preview.current_effective_level}`;
        comparison.innerHTML = "";
        preview.options.forEach((option) => {
          const row = document.createElement("div");
          row.className = "row";
          const title = document.createElement("div");
          title.className = "row-title";
          title.textContent = optionTitle(option);
          const content = document.createElement("div");
          content.className = "row-content";
          content.textContent = [option.definition, option.formula, option.implementation || option.implementation_status || ""].filter(Boolean).join("\n").trim() || "未配置";
          const actions = document.createElement("div");
          const requestButton = document.createElement("button");
          requestButton.textContent = "请求变更为此口径";
          requestButton.disabled = !option.formula && !option.definition;
          requestButton.addEventListener("click", () => submitChangeRequest(preview, option));
          const skipButton = document.createElement("button");
          skipButton.className = "ghost";
          skipButton.textContent = "跳过";
          skipButton.addEventListener("click", () => feedbackModal.hidden = true);
          actions.append(requestButton, skipButton);
          row.append(title, content, actions);
          comparison.appendChild(row);
        });
        feedbackModal.hidden = false;
      }

      async function submitChangeRequest(preview, option) {
        const payload = {
          rule_id: preview.rule_id,
          indicator_name: preview.rule_name,
          hospital_id: preview.hospital_id,
          target_level: "hospital",
          requested_definition: option.definition || "",
          requested_formula: option.formula || option.source_text || "",
          hospital_feedback: preview.requested.source_text || "",
          original_user_message: preview.requested.source_text || "",
          change_type: "本院口径反馈",
        };
        const response = await fetch("/api/review/change-requests", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.detail || "request failed");
        feedbackModal.hidden = true;
        addMessage("system", `已提交待审批：${data.change_id}`);
      }

      async function loadPendingReviews() {
        reviewList.innerHTML = "";
        const response = await fetch("/api/review/pending");
        const data = await response.json();
        if (!data.items.length) {
          const empty = document.createElement("div");
          empty.className = "meta";
          empty.textContent = "当前没有待审批口径。";
          reviewList.appendChild(empty);
          return;
        }
        data.items.forEach((item) => {
          const box = document.createElement("div");
          box.className = "review-item";
          const title = document.createElement("strong");
          title.textContent = `${item.change_id} ? ${item.indicator_name || item.rule_id} ? ${item.hospital_id}`;
          const body = document.createElement("div");
          body.className = "row-content";
          body.textContent = [item.requested_definition, item.requested_formula, item.hospital_feedback].filter(Boolean).join("\n");
          const actions = document.createElement("div");
          actions.className = "review-actions";
          const approve = document.createElement("button");
          approve.textContent = "确认通过";
          approve.addEventListener("click", () => approveChange(item.change_id));
          const reject = document.createElement("button");
          reject.className = "danger";
          reject.textContent = "拒绝";
          reject.addEventListener("click", () => rejectChange(item.change_id));
          actions.append(approve, reject);
          box.append(title, body, actions);
          reviewList.appendChild(box);
        });
      }

      async function approveChange(changeId) {
        const response = await fetch(`/api/review/change-requests/${changeId}/approve`, { method: "POST" });
        const data = await response.json();
        if (!response.ok) throw new Error(data.detail || "approve failed");
        addMessage("system", `已生效到医院口径：${data.override_path}`);
        await loadPendingReviews();
      }

      async function rejectChange(changeId) {
        const response = await fetch(`/api/review/change-requests/${changeId}/reject`, { method: "POST" });
        const data = await response.json();
        if (!response.ok) throw new Error(data.detail || "reject failed");
        addMessage("system", `已拒绝：${changeId}`);
        await loadPendingReviews();
      }

      document.querySelectorAll("[data-close]").forEach((node) => {
        node.addEventListener("click", () => document.querySelector(`#${node.dataset.close}`).hidden = true);
      });

      newSessionButton.addEventListener("click", () => {
        sessionId = null;
        latestFeedbackPreview = null;
        localStorage.removeItem("coreRulesSessionId");
        messages.innerHTML = "";
        updateSessionLabel();
      });

      reviewButton.addEventListener("click", async () => {
        reviewModal.hidden = false;
        await loadPendingReviews();
      });

      button.addEventListener("click", async () => {
        const query = queryInput.value.trim();
        if (!query) return;
        button.disabled = true;
        addMessage("user", query);
        try {
          await streamChat(query);
        } catch (error) {
          addMessage("assistant", `请求失败：${error}`);
        } finally {
          button.disabled = false;
        }
      });

      updateSessionLabel();
    </script>
  </body>
</html>
