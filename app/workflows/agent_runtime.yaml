workflow_id: agent_runtime
name: 工具调用型 Agent 运行链路
description: 记录从会话读取、业务规划、状态控制、模型执行、工具观察、证据校验到会话保存的真实阶段。

nodes:
  - id: memory_load
    agent_owner: human_interaction
    title: 读取会话上下文
    type: storage
    description: 从 SQLite 与 JSONL 读取结构化状态和最近八轮压缩对话。
    inputs: [context]
    outputs: [state]
    required: true
    on_failure: stop
    required_inputs: [context]
    required_outputs: [state]
    config: {storage: "SQLite + JSONL", history_turns: 8}
    failure_hint: 检查会话存储、版本冲突和目录权限。

  - id: planner_llm
    agent_owner: human_interaction
    title: 规划业务目标
    type: llm
    description: 将完整安全上下文发送给 Planner，并把模型 JSON 校验为业务 RequestPlan。
    inputs: [messages, tools, temperature]
    outputs: [raw_content, normalized_plan]
    required: true
    on_failure: stop
    required_inputs: [messages]
    required_outputs: []
    config: {prompt_file: agent_planner.txt, max_repair_count: 1, chain_of_thought: not_recorded}
    failure_hint: 检查原始模型输出、归一化计划和 validation_error。

  - id: plan_compile
    agent_owner: human_interaction
    title: 编译业务计划
    type: code
    description: 把业务语义计划确定性编译为能力节点、依赖事实和验收事实。
    inputs: [request_plan]
    outputs: [compiled_plan]
    required: true
    on_failure: stop
    required_inputs: [request_plan]
    required_outputs: [compiled_plan]
    config: {implementation: PlanCompiler}
    failure_hint: 检查意图与 requested_outputs 是否存在冲突。

  - id: plan_validate
    agent_owner: human_interaction
    title: 校验业务计划
    type: code
    description: 校验权限、目标冲突和统计时间，生成确定性澄清或安全阻断。
    inputs: [request_plan, current_time]
    outputs: [validation]
    required: true
    on_failure: stop
    required_inputs: [request_plan]
    required_outputs: [validation]
    config: {implementation: PlanValidator}
    failure_hint: 查看 validation.code、时间解析和用户约束。

  - id: state_controller
    agent_owner: human_interaction
    title: 选择下一业务能力
    type: code
    description: 根据已取得事实决定下一能力；工具步骤交给服务端编译，证据齐全后进入最终回答。
    inputs: [compiled_plan, validation, state]
    outputs: [decision]
    required: true
    on_failure: stop
    required_inputs: [compiled_plan, validation, state]
    required_outputs: [decision]
    config: {implementation: AgentStateController, max_tools_per_capability: 1}
    failure_hint: 检查计划事实、工具结果码和 fallback_category。

  - id: deterministic_tool_dispatch
    agent_owner: human_interaction
    title: 编译工具调用
    type: code
    description: 根据已校验业务计划、结构化状态和用户原文确定唯一工具及参数，不经过模型路由。
    inputs: [request_plan, decision, state, user_message]
    outputs: [tool_call]
    required: false
    on_failure: stop
    required_inputs: [request_plan, decision, state, user_message]
    required_outputs: [tool_call]
    config: {implementation: build_deterministic_tool_call, llm_calls: 0}
    failure_hint: 检查 rule_id、统计区间、sql_id 或上传文件编号是否已进入结构化状态。

  - id: executor_llm
    agent_owner: human_interaction
    title: 生成最终回答
    type: llm
    description: 在业务工具和证据校验完成后，根据完整安全上下文生成最终中文回答，不参与工具选择。
    inputs: [messages, temperature]
    outputs: [content, usage]
    required: true
    on_failure: stop
    required_inputs: [messages]
    required_outputs: [content]
    config: {prompt_file: agent_executor.txt, temperature: 0, tools: none, chain_of_thought: metadata_only}
    failure_hint: 检查完整 messages、证据、MODEL_EMPTY_ACTION 和模型安全元数据。

  - id: tool_gateway
    agent_owner: human_interaction
    title: 校验并调用业务工具
    type: tool
    description: 校验权限、参数、风险等级、重复调用和超时后执行受控工具。
    inputs: [tool_name, arguments]
    outputs: [gateway_status, risk_level]
    required: false
    on_failure: stop
    required_inputs: [tool_name, arguments]
    required_outputs: [gateway_status]
    config: {authority: server_injected}
    failure_hint: 检查工具是否属于当前计划以及参数是否满足 schema。

  - id: tool_result
    agent_owner: human_interaction
    title: 观察工具结果
    type: tool
    description: 保存工具完整安全结果、证据来源和耗时，供控制器继续推进并供最终回答模型引用。
    inputs: [tool_name]
    outputs: [result, tool_result_code, evidence_source]
    required: false
    on_failure: continue
    required_inputs: [tool_name]
    required_outputs: [tool_result_code]
    config: {patient_rows: not_recorded, secrets: redacted}
    failure_hint: 根据结果码检查数据源、字段映射、SQL 对象或业务服务。

  - id: plan_verify
    agent_owner: human_interaction
    title: 校验证据完整性
    type: code
    description: 校验医院、规则、版本、时间、SQL 和聚合数值证据链一致性。
    inputs: [compiled_plan, state, context]
    outputs: [verification]
    required: false
    on_failure: stop
    required_inputs: [compiled_plan, state, context]
    required_outputs: [verification]
    config: {implementation: PlanVerifier}
    failure_hint: 检查 missing_facts、SQL 链路和分子分母计算。

  - id: response_guard
    agent_owner: human_interaction
    title: 校验并整理回答
    type: code
    description: 规范中文 Markdown 与公式，并阻止缺少证据的完成性声明。
    inputs: [raw_content, evidence]
    outputs: [answer, missing_fact_types]
    required: true
    on_failure: stop
    required_inputs: [raw_content]
    required_outputs: [answer]
    config: {implementation: deterministic_response_guard}
    failure_hint: 检查模型回答是否引用了本轮不存在的事实。

  - id: memory_save
    agent_owner: human_interaction
    title: 保存会话上下文
    type: storage
    description: 保存本轮问答、结构化状态与安全对象引用，供后续追问使用。
    inputs: [query, answer, state]
    outputs: [saved]
    required: true
    on_failure: continue
    required_inputs: []
    required_outputs: []
    config: {storage: "SQLite + JSONL", history_turns: 8}
    failure_hint: 检查会话存储目录权限和上下文版本冲突。

edges: []
