workflow_id: agent_runtime
name: 工具调用型 Agent 运行链路
description: 记录从会话读取、业务规划、状态控制、模型执行、工具观察、证据校验到会话保存的真实阶段。

nodes:
  - id: indicator_rule_match
    agent_owner: human_interaction
    title: 规则识别指标
    type: code
    description: 在完整用户文本中扫描正式名称、简称和已审核医院别名，并映射到权威 rule_id。
    inputs: [query, hospital_id]
    outputs: [matches, normalization_ambiguities]
    required: false
    on_failure: continue
    required_inputs: [query, hospital_id]
    required_outputs: [matches]
    config: {resolver_layer: rule, llm_calls: 0}
    failure_hint: 检查术语发布版本、别名审核状态和规则关联。

  - id: indicator_semantic_retrieval
    agent_owner: human_interaction
    title: 语义召回指标
    type: code
    description: 对规则未命中的疑似指标片段做本地相似度召回，产生唯一结果或有限候选。
    inputs: [segments]
    outputs: [resolved, candidate_groups]
    required: false
    on_failure: continue
    required_inputs: [segments]
    required_outputs: [resolved, candidate_groups]
    config: {resolver_layer: local_semantic, llm_calls: 0}
    failure_hint: 检查疑似指标片段、相似度阈值和候选分差。

  - id: indicator_llm_disambiguation
    agent_owner: human_interaction
    title: 模型消歧指标候选
    type: llm
    description: 仅在本地候选无法唯一确认时，让当前模型从服务端候选 rule_id 中选择或返回 null。
    inputs: [messages, tools, temperature]
    outputs: [raw_content, resolved, remaining_groups]
    required: false
    on_failure: continue
    required_inputs: [messages]
    required_outputs: []
    config: {prompt_file: indicator_candidate_disambiguator.txt, tools: none, candidate_only: true}
    failure_hint: 检查候选组、模型 JSON 和返回的 rule_id 是否属于候选。

  - id: compound_request_split
    agent_owner: human_interaction
    title: 拆分复合指标任务
    type: code
    description: 确定性拆分多个指标子任务并解析公共统计周期。
    inputs: [user_message]
    outputs: [subqueries]
    required: false
    on_failure: stop
    required_inputs: [user_message]
    required_outputs: [subqueries]
    config: {max_tasks: 3}
    failure_hint: 检查并列指标表达和会话中的复数 rule_id。

  - id: compound_subtask_plan
    agent_owner: human_interaction
    title: 编译子任务计划
    type: code
    description: 为一个指标子任务生成独立业务计划。
    inputs: [subquery, subtask_index]
    outputs: [request_plan]
    required: false
    on_failure: stop
    required_inputs: [subquery]
    required_outputs: [request_plan]
    config: {state_scope: child}
    failure_hint: 检查指标子句和公共统计周期。

  - id: compound_subtask_queue
    agent_owner: human_interaction
    title: 子任务排队
    type: code
    description: 子任务进入按模型提供方配置的轻量并发队列。
    inputs: [subquery, subtask_index]
    outputs: [concurrency_limit]
    required: false
    on_failure: stop
    required_inputs: [subquery]
    required_outputs: [concurrency_limit]
    config: {queue: asyncio.Semaphore}
    failure_hint: 检查并发配置和取消传播。

  - id: compound_subtask_execute
    agent_owner: human_interaction
    title: 执行隔离子任务
    type: code
    description: 获取并发许可后，在独立 child state 与 Evidence namespace 中执行子任务。
    inputs: [subquery, subtask_index]
    outputs: [queue_duration_ms]
    required: false
    on_failure: continue
    required_inputs: [subquery]
    required_outputs: [queue_duration_ms]
    config: {state_scope: child, cancellation: propagated}
    failure_hint: 检查排队耗时、模型超时和局部失败。

  - id: compound_result_merge
    agent_owner: human_interaction
    title: 合并复合任务结果
    type: code
    description: 按用户输入顺序合并各子任务结果，并保留局部失败。
    inputs: [subtask_count]
    outputs: [section_count, stop_reason]
    required: false
    on_failure: stop
    required_inputs: [subtask_count]
    required_outputs: [section_count]
    config: {order: user_input}
    failure_hint: 检查子任务结果数量和顺序。

  - id: memory_load
    agent_owner: human_interaction
    title: 读取会话上下文
    type: storage
    description: 从 SQLite 与 JSONL 读取结构化状态和最近八轮压缩对话。
    inputs: [context]
    outputs: [state]
    required: true
    on_failure: stop
    required_inputs: [context]
    required_outputs: [state]
    config: {storage: "SQLite + JSONL", history_turns: 8}
    failure_hint: 检查会话存储、版本冲突和目录权限。

  - id: planner_llm
    agent_owner: human_interaction
    title: 规划业务目标
    type: llm
    description: 将完整安全上下文发送给 Planner，并把模型 JSON 校验为业务 RequestPlan。
    inputs: [messages, tools, temperature]
    outputs: [raw_content, normalized_plan]
    required: true
    on_failure: stop
    required_inputs: [messages]
    required_outputs: []
    config: {prompt_file: agent_planner.txt, max_repair_count: 1, chain_of_thought: not_recorded}
    failure_hint: 检查原始模型输出、归一化计划和 validation_error。

  - id: plan_compile
    agent_owner: human_interaction
    title: 编译业务计划
    type: code
    description: 把业务语义计划确定性编译为能力节点、依赖事实和验收事实。
    inputs: [request_plan]
    outputs: [compiled_plan]
    required: true
    on_failure: stop
    required_inputs: [request_plan]
    required_outputs: [compiled_plan]
    config: {implementation: PlanCompiler}
    failure_hint: 检查意图与 requested_outputs 是否存在冲突。

  - id: plan_validate
    agent_owner: human_interaction
    title: 校验业务计划
    type: code
    description: 校验权限、目标冲突和统计时间，生成确定性澄清或安全阻断。
    inputs: [request_plan, current_time]
    outputs: [validation]
    required: true
    on_failure: stop
    required_inputs: [request_plan]
    required_outputs: [validation]
    config: {implementation: PlanValidator}
    failure_hint: 查看 validation.code、时间解析和用户约束。

  - id: state_controller
    agent_owner: human_interaction
    title: 选择下一业务能力
    type: code
    description: 根据已取得事实决定下一能力；工具步骤交给服务端编译，证据齐全后进入最终回答。
    inputs: [compiled_plan, validation, state]
    outputs: [decision]
    required: true
    on_failure: stop
    required_inputs: [compiled_plan, validation, state]
    required_outputs: [decision]
    config: {implementation: AgentStateController, max_tools_per_capability: 1}
    failure_hint: 检查计划事实、工具结果码和 fallback_category。

  - id: deterministic_tool_dispatch
    agent_owner: human_interaction
    title: 编译工具调用
    type: code
    description: 根据已校验业务计划、结构化状态和用户原文确定唯一工具及参数，不经过模型路由。
    inputs: [request_plan, decision, state, user_message]
    outputs: [tool_call]
    required: false
    on_failure: stop
    required_inputs: [request_plan, decision, state, user_message]
    required_outputs: [tool_call]
    config: {implementation: build_deterministic_tool_call, llm_calls: 0}
    failure_hint: 检查 rule_id、统计区间、sql_id 或上传文件编号是否已进入结构化状态。

  - id: final_answer_llm
    agent_owner: human_interaction
    title: 生成最终回答
    type: llm
    description: 在业务工具和证据校验完成后，根据完整安全上下文生成最终中文回答，不参与工具选择。
    inputs: [messages, temperature]
    outputs: [content, usage]
    required: true
    on_failure: stop
    required_inputs: [messages]
    required_outputs: [content]
    config: {prompt_file: agent_final_answer.txt, temperature: 0, tools: none, chain_of_thought: metadata_only}
    failure_hint: 检查完整 messages、证据、MODEL_EMPTY_ACTION 和模型安全元数据。

  - id: plan_replan
    agent_owner: human_interaction
    title: 重新规划业务方向
    type: code
    description: 仅在允许的语义方向错误下接受一次替代计划，并保留原计划和失败路径。
    inputs: [original_plan_id, failure_code, failure_reason, known_facts]
    outputs: [compiled_plan, replan_count]
    required: false
    on_failure: stop
    required_inputs: [original_plan_id, failure_code]
    required_outputs: [compiled_plan]
    config: {max_replan_count: 1}
    failure_hint: 检查 FailureClass 是否允许 Replan，以及新计划是否重复旧失败指纹。

  - id: executor_llm
    agent_owner: human_interaction
    title: 生成最终回答（历史节点）
    type: llm
    description: 兼容升级前 Trace；语义等同 final_answer_llm，不再用于新运行。
    inputs: [messages, temperature]
    outputs: [content, usage]
    required: false
    on_failure: stop
    required_inputs: [messages]
    required_outputs: []
    config: {legacy_alias_of: final_answer_llm}
    failure_hint: 按 final_answer_llm 的方式排查历史记录。

  - id: tool_gateway
    agent_owner: human_interaction
    title: 校验并调用业务工具
    type: tool
    description: 校验权限、参数、风险等级、重复调用和超时后执行受控工具。
    inputs: [tool_name, arguments]
    outputs: [gateway_status, risk_level]
    required: false
    on_failure: stop
    required_inputs: [tool_name, arguments]
    required_outputs: [gateway_status]
    config: {authority: server_injected}
    failure_hint: 检查工具是否属于当前计划以及参数是否满足 schema。

  - id: tool_result
    agent_owner: human_interaction
    title: 观察工具结果
    type: tool
    description: 保存工具完整安全结果、证据来源和耗时，供控制器继续推进并供最终回答模型引用。
    inputs: [tool_name]
    outputs: [result, tool_result_code, evidence_source]
    required: false
    on_failure: continue
    required_inputs: [tool_name]
    required_outputs: [tool_result_code]
    config: {patient_rows: not_recorded, secrets: redacted}
    failure_hint: 根据结果码检查数据源、字段映射、SQL 对象或业务服务。

  - id: plan_verify
    agent_owner: human_interaction
    title: 校验证据完整性
    type: code
    description: 校验医院、规则、版本、时间、SQL 和聚合数值证据链一致性。
    inputs: [compiled_plan, state, context]
    outputs: [verification]
    required: false
    on_failure: stop
    required_inputs: [compiled_plan, state, context]
    required_outputs: [verification]
    config: {implementation: PlanVerifier}
    failure_hint: 检查 missing_facts、SQL 链路和分子分母计算。

  - id: response_guard
    agent_owner: human_interaction
    title: 校验并整理回答
    type: code
    description: 规范中文 Markdown 与公式，并阻止缺少证据的完成性声明。
    inputs: [raw_content, evidence]
    outputs: [answer, missing_fact_types]
    required: true
    on_failure: stop
    required_inputs: [raw_content]
    required_outputs: [answer]
    config: {implementation: deterministic_response_guard}
    failure_hint: 检查模型回答是否引用了本轮不存在的事实。

  - id: memory_save
    agent_owner: human_interaction
    title: 保存会话上下文
    type: storage
    description: 保存本轮问答、结构化状态与安全对象引用，供后续追问使用。
    inputs: [query, answer, state]
    outputs: [saved]
    required: true
    on_failure: continue
    required_inputs: []
    required_outputs: []
    config: {storage: "SQLite + JSONL", history_turns: 8}
    failure_hint: 检查会话存储目录权限和上下文版本冲突。

edges: []
