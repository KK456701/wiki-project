workflow_id: indicator_generation_closed_loop
name: 指标设计稿生成闭环
description: 从自然语言指标设计稿到本院规则审批发布的独立工作流。

nodes:
  - id: draft_parse
    agent_owner: indicator_generation
    title: 解析指标设计稿
    type: llm_structured
    description: 将业务描述转换为单表、强类型的指标口径和计算计划，不允许模型直接生成 SQL。
    inputs: [query, hospital_id]
    outputs: [draft_spec, sql_plan, metadata_requirements]
    required: true
    on_failure: stop
    required_inputs: [query, hospital_id]
    required_outputs: [draft_spec, sql_plan]
    config:
      model: Ollama 本地模型
      retry: 结构校验失败后受控纠错一次
      sql_policy: 禁止模型输出 SQL
    failure_hint: 检查本地 Ollama、指标描述是否完整，以及模型输出是否符合字段和条件对象结构。

  - id: draft_save
    agent_owner: indicator_generation
    title: 保存设计稿版本
    type: version_store
    description: 保存设计稿当前状态和不可变版本快照，后续修改使用乐观版本号防止覆盖。
    inputs: [draft_spec, actor_id]
    outputs: [draft_id, current_version, status]
    required: true
    on_failure: stop
    required_inputs: [draft_spec, actor_id]
    required_outputs: [draft_id, current_version]
    config:
      tables: med_indicator_draft + med_indicator_draft_version
    failure_hint: 检查运行数据库连接、设计稿表是否初始化，以及 expected_version 是否已过期。

  - id: metadata_confirm
    agent_owner: metadata_parsing
    title: 确认数据库字段
    type: metadata_check
    description: 从最近一次元数据快照推荐业务字段对应列，并要求用户确认所有字段来自同一主表。
    inputs: [draft_id, metadata_requirements, expected_version]
    outputs: [field_mapping, missing_fields, current_version]
    required: true
    on_failure: stop
    required_inputs: [draft_id, metadata_requirements]
    required_outputs: [field_mapping]
    config:
      source: med_metadata_column
      table_policy: 第一版只允许单一主表
    failure_hint: 缺少字段时先通过 MCP 同步业务库元数据，再检查表名、字段注释和字段类型。

  - id: draft_sql_generate
    agent_owner: indicator_generation
    title: 生成并校验 SQL
    type: deterministic_sql
    description: 根据已确认字段和结构化计算计划确定性渲染参数化 SELECT，并执行安全校验。
    inputs: [sql_plan, field_mapping, hospital_id]
    outputs: [sql_id, sql_text, sql_params, current_version]
    required: true
    on_failure: stop
    required_inputs: [sql_plan, field_mapping, hospital_id]
    required_outputs: [sql_id, sql_text]
    config:
      renderer: render_indicator_sql
      tenant_scope: hospital_id 由系统固定
      allow: SELECT
    failure_hint: 检查字段映射是否全部确认、时间差条件是否合法，以及 SQL 安全校验的具体错误。

  - id: draft_trial_run
    agent_owner: indicator_generation
    title: 试运行指标 SQL
    type: mcp_tool
    description: 通过 DBHub 只读执行当前版本 SQL，保存统计区间、结果、耗时和错误信息。
    inputs: [sql_id, sql_text, sql_params, stat_start_time, stat_end_time]
    outputs: [run_id, trial_result, duration_ms, current_version]
    required: true
    on_failure: stop
    required_inputs: [sql_id, sql_text, stat_start_time, stat_end_time]
    required_outputs: [trial_result]
    config:
      tool: execute_sql_win60_qa_991827
      readonly: true
    failure_hint: 检查 DBHub、业务库只读账号、统计区间参数和 SQL 中使用的实际字段。

  - id: draft_submit
    agent_owner: indicator_generation
    title: 提交指标审批
    type: review
    description: 只允许当前版本试运行成功的设计稿进入待审批状态，并锁定对应试运行证据。
    inputs: [draft_id, expected_version, trial_result, actor_id]
    outputs: [status, trial_draft_version, current_version]
    required: true
    on_failure: stop
    required_inputs: [draft_id, expected_version, trial_result]
    required_outputs: [status]
    config:
      required_status: trial_passed
    failure_hint: 检查当前版本是否与试运行版本一致，修改设计稿后必须重新生成 SQL 和试运行。

  - id: draft_publish
    agent_owner: caliber_adaptation
    title: 审批并发布本院指标
    type: review_publish
    description: 管理员审批后，在同一事务中发布本院新增指标或已有指标的本院口径差异，并保存正式版本。
    inputs: [draft_id, expected_version, approver_id]
    outputs: [formal_index_code, publication_type, active_version, status]
    required: true
    on_failure: stop
    required_inputs: [draft_id, expected_version, approver_id]
    required_outputs: [formal_index_code, active_version]
    config:
      existing_target: med_index_hospital_custom
      new_target: med_index_hospital_defined
      transaction: 规则、字段映射、版本和设计稿状态原子提交
    failure_hint: 检查管理员权限、设计稿是否仍为待审批、试运行证据是否过期，以及正式规则表是否初始化。

edges:
  - from: draft_parse
    to: draft_save
  - from: draft_save
    to: metadata_confirm
  - from: metadata_confirm
    to: draft_sql_generate
  - from: draft_sql_generate
    to: draft_trial_run
  - from: draft_trial_run
    to: draft_submit
  - from: draft_submit
    to: draft_publish
    condition: 管理员审批通过
