spring:
  jackson:
    property-naming-strategy: SNAKE_CASE
    deserialization:
      fail-on-unknown-properties: true
  datasource:
    url: jdbc:h2:mem:wiki_agent_context;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
  sql:
    init:
      mode: never

wiki:
  agent:
    default-model: ollama-test
    evidence-jsonl-path: target/test-agent-evidence.jsonl
    models:
      - id: ollama-test
        name: Ollama Test
        provider: ollama
        model: qwen3:4b
        base-url: http://127.0.0.1:11434
