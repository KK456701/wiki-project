server:
  address: 127.0.0.1
  port: 8766

spring:
  application:
    name: wiki-agent-java
  datasource:
    url: ${WIKI_RUNTIME_DB_URL:jdbc:mysql://127.0.0.1:3306/wiki_agent_runtime?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${WIKI_RUNTIME_DB_USER:root}
    password: ${WIKI_RUNTIME_DB_PASSWORD:}
    hikari:
      maximum-pool-size: 6
      minimum-idle: 0
      connection-timeout: 5000
  jackson:
    property-naming-strategy: SNAKE_CASE
    deserialization:
      fail-on-unknown-properties: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

wiki:
  auth:
    session-hours: 8
  agent:
    default-model: ${AGENT_DEFAULT_MODEL:ollama-qwen3}
    planner-timeout: 90s
    final-answer-timeout: 120s
    compound-api-concurrency: 2
    compound-ollama-concurrency: 1
    compound-db-concurrency: 2
    compound-timeout: 300s
    evidence-ttl-days: 30
    evidence-jsonl-path: runtime/agent_evidence_java.jsonl
    upload:
      root: runtime/uploads
      max-bytes: 10485760
      max-uncompressed-bytes: 52428800
      max-entries: 2000
      max-rows-per-sheet: 5001
      max-columns: 100
    details:
      export-root: runtime/exports
      expire-hours: 24
      max-rows: 20000
      default-page-size: 50
    models:
      - id: ollama-qwen3
        name: Qwen3 4B（本地 Ollama）
        provider: ollama
        model: ${OLLAMA_MODEL:qwen3:4B-instruct}
        base-url: ${OLLAMA_BASE_URL:http://127.0.0.1:11434}
        thinking: false
      - id: ollama-qwen3-8b-thinking
        name: Qwen3 8B 思考模式（本地 Ollama）
        provider: ollama
        model: ${OLLAMA_THINKING_MODEL:qwen3:8b}
        base-url: ${OLLAMA_BASE_URL:http://127.0.0.1:11434}
        thinking: true
      - id: deepseek-v4-flash
        name: DeepSeek V4 Flash（API）
        provider: openai-compatible
        model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
        base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
        api-key: ${DEEPSEEK_API_KEY:}
        thinking: false
      - id: deepseek-v4-pro
        name: DeepSeek V4 Pro（API）
        provider: openai-compatible
        model: ${DEEPSEEK_PRO_MODEL:deepseek-v4-pro}
        base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
        api-key: ${DEEPSEEK_API_KEY:}
        thinking: true
  dbhub:
    api-url: http://127.0.0.1:8080
    mcp-url: http://127.0.0.1:8080/mcp
    source-id: ${DBHUB_SOURCE_ID_WIN60_QA_991827:win60_qa_991827}
    execute-tool: ${DBHUB_EXECUTE_TOOL_WIN60_QA_991827:execute_sql_win60_qa_991827}
    timeout-seconds: 10
