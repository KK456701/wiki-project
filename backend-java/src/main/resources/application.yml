server:
  address: 0.0.0.0
  port: 8766

spring:
  application:
    name: wiki-agent-java
  datasource:
    url: ${WIKI_RUNTIME_DB_URL:jdbc:sqlite:runtime/wiki_agent_runtime.db}
    driver-class-name: org.sqlite.JDBC
    username: ""
    password: ""
    hikari:
      maximum-pool-size: 6
      minimum-idle: 0
      connection-timeout: 5000
      connection-init-sql: PRAGMA busy_timeout=30000
  sql:
    init:
      mode: always
      schema-locations: classpath:sqlite-runtime-schema.sql
      continue-on-error: false
  jackson:
    property-naming-strategy: SNAKE_CASE
    deserialization:
      fail-on-unknown-properties: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

wiki:
  knowledge:
    root: ${WIKI_KNOWLEDGE_ROOT:core-rules-wiki}
  admin:
    password: ${WIKI_ADMIN_PASSWORD:CHANGE_ME}
  auth:
    session-hours: 8
  agent:
    default-model: ${AGENT_DEFAULT_MODEL:ollama-qwen3}
    planner-timeout: 90s
    final-answer-timeout: 120s
    compound-api-concurrency: 2
    compound-ollama-concurrency: 1
    compound-db-concurrency: 2
    compound-timeout: 300s
    trace-retention-days: 30
    trace-slow-request-ms: 120000
    trace-slow-llm-ms: 60000
    trace-tool-failure-warning-rate: 0.05
    trace-timeout-warning-rate: 0.05
    evidence-ttl-days: 30
    evidence-jsonl-path: runtime/agent_evidence_java.jsonl
    upload:
      root: runtime/uploads
      max-bytes: 10485760
      max-uncompressed-bytes: 52428800
      max-entries: 2000
      max-rows-per-sheet: 5001
      max-columns: 100
    details:
      export-root: runtime/exports
      expire-hours: 24
      max-rows: 20000
      default-page-size: 50
    models:
      - id: ollama-qwen3
        name: Qwen3 4B（本地 Ollama）
        provider: ollama
        model: ${OLLAMA_MODEL:qwen3:4B-instruct}
        base-url: ${OLLAMA_BASE_URL:http://127.0.0.1:11434}
        thinking: false
      - id: ollama-qwen3-8b-thinking
        name: Qwen3 8B 思考模式（本地 Ollama）
        provider: ollama
        model: ${OLLAMA_THINKING_MODEL:qwen3:8b}
        base-url: ${OLLAMA_BASE_URL:http://127.0.0.1:11434}
        thinking: true
      - id: aliyun-qwen3-14b
        name: Qwen3 14B（阿里云百炼 API）
        provider: openai-compatible
        model: ${DASHSCOPE_QWEN3_14B_MODEL:qwen3-14b}
        base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
        # Spring AI 默认路径自带 /v1；百炼官方 Base URL 已含 /v1，所以这里只追加 chat/completions。
        completions-path: /chat/completions
        api-key: ${DASHSCOPE_API_KEY:}
        # Qwen3 默认开启思考。Agent Planner 更需要稳定的结构化输出，默认关闭；需要时可通过环境变量开启。
        thinking: ${DASHSCOPE_QWEN3_14B_ENABLE_THINKING:false}
        enable-thinking: ${DASHSCOPE_QWEN3_14B_ENABLE_THINKING:false}
      - id: deepseek-v4-flash
        name: DeepSeek V4 Flash（API）
        provider: openai-compatible
        model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
        base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
        api-key: ${DEEPSEEK_API_KEY:}
        thinking: false
      - id: deepseek-v4-pro
        name: DeepSeek V4 Pro（API）
        provider: openai-compatible
        model: ${DEEPSEEK_PRO_MODEL:deepseek-v4-pro}
        base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
        api-key: ${DEEPSEEK_API_KEY:}
        thinking: true
  dbhub:
    api-url: ${DBHUB_API_URL:http://127.0.0.1:8080}
    mcp-url: ${DBHUB_MCP_URL:http://127.0.0.1:8080/mcp}
    source-id: ${DBHUB_SOURCE_ID_WIN60_QA_991827:win60_qa_991827}
    execute-tool: ${DBHUB_EXECUTE_TOOL_WIN60_QA_991827:execute_sql_win60_qa_991827}
    database-name: ${BUSINESS_DB_DATABASE:WIN60_QA_991827}
    schema-name: ${BUSINESS_DB_SCHEMA:WINDBA}
    timeout-seconds: 10
  monitoring:
    scheduler-enabled: ${MONITORING_SCHEDULER_ENABLED:false}
    scan-delay-ms: ${MONITORING_SCAN_DELAY_MS:60000}
    lease-seconds: ${MONITORING_LEASE_SECONDS:600}
