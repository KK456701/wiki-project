rule_id: MQSI2025_001
rule_name: 患者入院48小时内转科比例
dialects: [mysql, oracle]
default_params:
  transfer_hours_threshold: 48
description: 入院48小时内发生转科的患者人次数占同期入院患者总人次数的比例。
numerator:
  name: 入院48小时内转科患者人次数
  logic:
    - transfer_time is not null
    - transfer_hours <= transfer_hours_threshold
denominator:
  name: 同期入院患者总人次数
  logic:
    - admission_id is not null
required_business_fields:
  - hospital_id
  - admission_id
  - admit_time
  - transfer_time
required_params:
  - hospital_id
  - start_time
  - end_time
  - transfer_hours_threshold
result:
  column_name: index_value
  unit: percent
