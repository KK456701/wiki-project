rule_id: MQSI2025_005
rule_name: 急会诊及时到位率
dialects: [mysql]
default_params:
  arrive_minutes_threshold: 10
  consult_type_value: 急会诊
description: 急会诊请求发出后，在指定分钟数内到达现场的急会诊次数占同期急会诊总次数的比例。
numerator:
  name: 及时到位急会诊次数
  logic:
    - consult_type = consult_type_value
    - 0 <= arrive_minutes <= arrive_minutes_threshold
denominator:
  name: 同期急会诊总次数
  logic:
    - consult_type = consult_type_value
required_business_fields:
  - hospital_id
  - consult_type
  - request_time
  - arrive_time
required_params:
  - hospital_id
  - start_time
  - end_time
  - arrive_minutes_threshold
  - consult_type_value
result: {column_name: index_value, unit: percent}
calculation:
  schema_version: 1
  scope:
    conditions:
      - id: hospital_scope
        field: hospital_id
        operator: equals
        parameter: hospital_id
      - id: period_scope
        field: request_time
        operator: half_open_range
        parameters: [start_time, end_time]
  derived_fields:
    arrive_minutes:
      name: 申请至到位耗时
      operation: timestamp_diff_minutes
      source_fields: [request_time, arrive_time]
  denominator:
    name: 同期急会诊总次数
    inherits: scope
    conditions:
      - id: urgent_consult
        field: consult_type
        operator: equals
        parameter: consult_type_value
    aggregate:
      method: count_rows
  numerator:
    name: 及时到位急会诊次数
    inherits: denominator
    conditions:
      - id: timely_arrival
        field: arrive_minutes
        operator: inclusive_range
        values: [0, arrive_minutes_threshold]
    aggregate:
      method: count_rows
  result:
    operation: ratio_percent
    numerator: numerator
    denominator: denominator
  detail_fields:
    - {field: patient_id, label: 患者标识, sensitivity: patient_id}
    - {field: dept_id, label: 科室, sensitivity: none}
    - {field: consult_type, label: 会诊类型, sensitivity: none}
    - {field: request_time, label: 申请时间, sensitivity: none}
    - {field: arrive_time, label: 到位时间, sensitivity: none}
    - {field: arrive_minutes, label: 到位耗时（分钟）, sensitivity: none}
