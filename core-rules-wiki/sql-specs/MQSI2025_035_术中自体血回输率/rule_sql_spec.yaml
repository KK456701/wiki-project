rule_id: MQSI2025_035
rule_name: 术中自体血回输率
dialects: [mysql]
default_params:
  transfusion_flag_value: 1
  autologous_flag_value: 1
description: 术中使用自体血回输的患者数占同期术中输血患者总数的比例，按患者去重。
numerator:
  name: 术中使用自体血回输的患者数
  logic:
    - intraoperative_transfusion_flag = transfusion_flag_value
    - autologous_reinfusion_flag = autologous_flag_value
    - distinct patient_id
denominator:
  name: 同期术中输血患者总数
  logic:
    - intraoperative_transfusion_flag = transfusion_flag_value
    - distinct patient_id
required_business_fields:
  - hospital_id
  - patient_id
  - surgery_time
  - intraoperative_transfusion_flag
  - autologous_reinfusion_flag
required_params:
  - hospital_id
  - start_time
  - end_time
  - transfusion_flag_value
  - autologous_flag_value
result: {column_name: index_value, unit: percent}
calculation:
  schema_version: 1
  scope:
    conditions:
      - id: hospital_scope
        field: hospital_id
        operator: equals
        parameter: hospital_id
      - id: period_scope
        field: surgery_time
        operator: half_open_range
        parameters: [start_time, end_time]
  derived_fields: {}
  denominator:
    name: 同期术中输血患者总数
    inherits: scope
    conditions:
      - id: intraoperative_transfusion
        field: intraoperative_transfusion_flag
        operator: equals
        parameter: transfusion_flag_value
    aggregate:
      method: count_distinct
      field: patient_id
  numerator:
    name: 术中使用自体血回输的患者数
    inherits: denominator
    conditions:
      - id: autologous_reinfusion
        field: autologous_reinfusion_flag
        operator: equals
        parameter: autologous_flag_value
    aggregate:
      method: count_distinct
      field: patient_id
  result:
    operation: ratio_percent
    numerator: numerator
    denominator: denominator
  detail_fields:
    - {field: patient_id, label: 患者标识, sensitivity: patient_id}
    - {field: surgery_id, label: 手术号, sensitivity: patient_id}
    - {field: dept_id, label: 科室, sensitivity: none}
    - {field: surgery_time, label: 手术时间, sensitivity: none}
    - {field: intraoperative_transfusion_flag, label: 术中输血, sensitivity: none}
    - {field: autologous_reinfusion_flag, label: 自体血回输, sensitivity: none}
